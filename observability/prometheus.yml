# Phase 1-4: Prometheus — Otel Collector에서 노출하는 메트릭 스크래핑
# 앱 메트릭·트레이스·로그는 앱 → OTLP → Collector → Prometheus/Loki/Tempo
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics
