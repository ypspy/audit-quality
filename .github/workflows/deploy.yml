# Phase 1-5: CD — main 브랜치 push 시 Docker 빌드 → 레지스트리 Push → (선택) 배포
# 참고: docs/deploy.md — Secrets(SSH_HOST, SSH_USER, SSH_PRIVATE_KEY) 설정 시 deploy 단계 활성화

name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push forward-auth
        uses: docker/build-push-action@v6
        with:
          context: ./forward-auth
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-forward-auth:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-forward-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push qualityPortal
        uses: docker/build-push-action@v6
        with:
          context: ./qualityPortal
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-portal:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-portal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push qualityEval
        uses: docker/build-push-action@v6
        with:
          context: ./qualityEval
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-eval:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-eval:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push timesheet
        uses: docker/build-push-action@v6
        with:
          context: ./timesheet
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-timesheet:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-timesheet:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dart-for-auditor
        uses: docker/build-push-action@v6
        with:
          context: ./dart-for-auditor
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-dart:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-dart:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push local-inquiry-site
        uses: docker/build-push-action@v6
        with:
          context: ./local-inquiry-site
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-inquiry:${{ github.sha }},${{ env.REGISTRY }}/${{ github.repository_owner }}/audit-quality-inquiry:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    # 배포 활성화: Repository variables에 DEPLOY_ENABLED=true 설정
    # Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, REGISTRY_TOKEN(GHCR 읽기용 PAT)
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GHCR_IMAGE_PREFIX: ${{ env.REGISTRY }}/${{ github.repository_owner }}
          IMAGE_TAG: latest
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REGISTRY_TOKEN,GITHUB_ACTOR,DEPLOY_PATH,GHCR_IMAGE_PREFIX,IMAGE_TAG
          script: |
            set -e
            cd "${DEPLOY_PATH:-$HOME/audit-quality}"
            if [ -n "$REGISTRY_TOKEN" ]; then
              echo "$REGISTRY_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            fi
            export GHCR_IMAGE_PREFIX="${GHCR_IMAGE_PREFIX}"
            export IMAGE_TAG="${IMAGE_TAG:-latest}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
